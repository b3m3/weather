<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" type="image/x-icon" href="favicon.svg">
  <link rel="stylesheet" href="css/style.min.css">
  <title>Weather</title>
</head>

<body>
  <div class="app" id="app">
    <main class="main">
      <section class="weather">
        <div class="weather__image">
          <img src="img/sun.svg" alt="weather">
        </div>
        <div class="weather__search">
          <div class="search__body">
            <input class="search__input" type="text" placeholder="Search">
            <button class="search__button"><span class="icon-search"></span></button>
          </div>
        </div>
        <div class="weather__info">
          <div class="info__row">
            <h3 class="info__town"><span class="country">Ukraine</span>, <span class="town">Kyiv</span></h3>
            <p class="info__temperature"><span class="temperature">--</span> &deg;C</p>
            <p class="info__sky"><span class="sky">--</span> <span class="icon-status icon-sunny"></span></p>
          </div>
          <div class="info__row">
            <p class="info__humidity">Humidity: <span class="humidity">--</span> %</p>
            <p class="info__wind">Speed: <span class="wind">--</span> m/s</p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="js/app.min.js"></script>
</body>

</html>
