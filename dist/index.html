<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" type="image/x-icon" href="favicon.svg">
  <link rel="stylesheet" href="css/style.min.css">
  <title>Weather</title>
</head>

<body>
  <div class="app" id="app">
    
    <main class="main">
      <div class="weather">
        <div class="weather__image-status">
          <img src="img/sun.svg" alt="weather">
        </div>
        <div class="weather__body body">
          <div class="body__search search-body">
            <input class="search-body__input" type="text" placeholder="Search">
            <button class="search-body__button"><span class="icon-search"></span></button>
          </div>
          <div class="body__info info-body">
            <div class="info-body__row">
              <h3 class="info-body__town"><span class="country">Ukraine</span>, <span class="town">Kyiv</span></h3>
              <p class="info-body__temperature"><span class="temperature">--</span> &deg;C</p>
              <p class="info-body__sky"><span class="sky">--</span> <span class="icon-status icon-sunny"></span></p>
            </div>
            <div class="info-body__row">
              <p class="info-body__humidity">Humidity: <span class="humidity">--</span> %</p>
              <p class="info-body__wind">Speed: <span class="wind">--</span> m/s</p>
            </div>
          </div>
        </div>
      </div>
    </main>
    
  </div>

  <script src="js/app.min.js"></script>
</body>

</html>
